steps:
  - name: 'gcr.io/cloud-builders/gcloud'
    args: ['app', 'deploy', 'app.yaml', '--quiet']
    dir: 'athena'

  - name: 'gcr.io/cloud-builders/gcloud'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        OLD_VERSIONS=$$(gcloud app versions list \
          --service=default \
          --filter="traffic_split=0" \
          --format="value(version.id)" \
          --sort-by="~last_deployed_time" | tail -n +2)

        if [ -n "$$OLD_VERSIONS" ]; then
          echo "Deleting old versions: $$OLD_VERSIONS"
          gcloud app versions delete $$OLD_VERSIONS --quiet
        else
          echo "No old versions to clean up."
        fi

timeout: '600s'
options:
  logging: CLOUD_LOGGING_ONLY