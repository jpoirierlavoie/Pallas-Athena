runtime: python311
instance_class: F2
automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65
env_variables:
  ENV: "production"
  # Other env vars set via gcloud app deploy or Secret Manager
handlers:
  - url: /static
    static_dir: static
    secure: always
  - url: /.*
    script: auto
    secure: always
