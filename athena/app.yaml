runtime: python311
instance_class: F2
automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65

entrypoint: gunicorn -b :$PORT main:app

env_variables:
  ENV: "production"
  FIREBASE_PROJECT_ID: "athena-pallas"
  FIREBASE_STORAGE_BUCKET: "athena-pallas.firebasestorage.app"
  # Sensitive values below should be set via Secret Manager or
  # `gcloud app deploy --set-env-vars` rather than checked into source.
  # The placeholders here exist so the app knows which keys to expect.
  FIREBASE_API_KEY: "SET-VIA-SECRET-MANAGER"
  AUTHORIZED_USER_EMAIL: "SET-VIA-SECRET-MANAGER"
  SECRET_KEY: "SET-VIA-SECRET-MANAGER"
  DAV_PASSWORD_HASH: "SET-VIA-SECRET-MANAGER"

handlers:
  - url: /static
    static_dir: static
    secure: always
    http_headers:
      Cache-Control: "public, max-age=3600"
  - url: /.*
    script: auto
    secure: always
