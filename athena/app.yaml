runtime: python313
instance_class: F2
automatic_scaling:
  # min_instances: 0 trades a cold start after idle (Flask + firebase_admin +
  # OTel imports, several seconds) for zero standing cost. Warmup requests
  # below soften this. Set min_instances: 1 to eliminate cold starts entirely
  # at the cost of one always-on F2 instance.
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65

# Ask App Engine to send /_ah/warmup before routing live traffic to a new
# instance (handled in main.py; primes Firebase/Firestore clients).
inbound_services:
  - warmup

# Explicit worker/thread/timeout sizing: gunicorn's defaults (1 sync worker,
# 30 s timeout) cap the whole app at ~2 concurrent requests across instances
# and SIGKILL slow DAV/dashboard requests. Threads overlap Firestore I/O.
entrypoint: gunicorn -b :$PORT --workers 2 --threads 4 --timeout 60 --graceful-timeout 30 main:app

env_variables:
  ENV: "production"
  FIREBASE_PROJECT_ID: "athena-pallas"
  FIREBASE_APP_ID: "1:1073430388324:web:6d60d0d67d74ce1b730971"
  FIREBASE_STORAGE_BUCKET: "athena-pallas.firebasestorage.app"
  AUTHORIZED_USER_EMAIL: "jason@poirierlavoie.ca"
  RECAPTCHA_ENTERPRISE_SITE_KEY: "6LeR9Y0sAAAAAJhkKWa_wYdbproZUQFjEO7FkfEb"
  REQUIRE_MFA: "true"
  PIP_REQUIRE_HASHES: "1"
  PIP_NO_DEPS: "1"
  # Secrets (SECRET_KEY, FIREBASE_API_KEY, DAV_PASSWORD_HASH) are pulled from
  # Google Cloud Secret Manager at runtime — see config.py.

handlers:
  - url: /manifest.json
    static_files: manifest.json
    upload: manifest.json
    mime_type: application/manifest+json

  - url: /sw.js
    static_files: static/sw.js
    upload: static/sw.js
    mime_type: application/javascript
    http_headers:
      Cache-Control: no-cache
      Service-Worker-Allowed: /
      X-Content-Type-Options: nosniff

  - url: /favicon.ico
    static_files: static/icons/favicon.ico
    upload: static/icons/favicon.ico
    mime_type: image/x-icon

  - url: /robots.txt
    static_files: robots.txt
    upload: robots.txt
    mime_type: text/plain

  - url: /apple-touch-icon-precomposed.png
    static_files: static/icons/icon-192.png
    upload: static/icons/icon-192.png
    mime_type: image/png

  - url: /apple-touch-icon.png
    static_files: static/icons/icon-192.png
    upload: static/icons/icon-192.png
    mime_type: image/png

  # Static handlers bypass Flask's after_request security headers — set the
  # baseline explicitly on every handler that serves HTML or scripts.
  - url: /privacy
    static_files: static/legal/privacy.html
    upload: static/legal/privacy.html
    mime_type: text/html
    http_headers:
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: strict-origin-when-cross-origin
      Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"

  - url: /terms
    static_files: static/legal/terms.html
    upload: static/legal/terms.html
    mime_type: text/html
    http_headers:
      X-Content-Type-Options: nosniff
      X-Frame-Options: DENY
      Referrer-Policy: strict-origin-when-cross-origin
      Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"

  # Vendored assets carry their version/hash in the filename and are therefore
  # immutable: cache for a year. HARD RULE — a changed asset MUST get a new
  # filename; never edit a vendor file in place.
  - url: /static/vendor
    static_dir: static/vendor
    secure: always
    http_headers:
      Cache-Control: "public, max-age=31536000, immutable"
      X-Content-Type-Options: nosniff
      Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"

  # Other static files (icons, owl.png, legal pages) are NOT version-named, so
  # they get a moderate lifetime instead of immutable.
  - url: /static
    static_dir: static
    secure: always
    http_headers:
      Cache-Control: "public, max-age=86400"
      X-Content-Type-Options: nosniff
      Strict-Transport-Security: "max-age=63072000; includeSubDomains; preload"

  - url: /.*
    script: auto
    secure: always
