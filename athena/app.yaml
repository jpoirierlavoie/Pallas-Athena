runtime: python311
instance_class: F2
automatic_scaling:
  min_instances: 0
  max_instances: 2
  target_cpu_utilization: 0.65

entrypoint: gunicorn -b :$PORT main:app

env_variables:
  ENV: "production"
  FIREBASE_API_KEY: "REDACTED_OLD_FIREBASE_API_KEY"
  FIREBASE_PROJECT_ID: "athena-pallas"
  FIREBASE_STORAGE_BUCKET: "athena-pallas.firebasestorage.app"
  AUTHORIZED_USER_EMAIL: "jason@poirierlavoie.ca"
  RECAPTCHA_ENTERPRISE_SITE_KEY: "6LeR9Y0sAAAAAJhkKWa_wYdbproZUQFjEO7FkfEb"
  REQUIRE_MFA: "false"
  # Sensitive — override via Secret Manager or gcloud deploy --set-env-vars
  SECRET_KEY: "CHANGE-ME-use-secret-manager-in-production"
  DAV_PASSWORD_HASH: "REDACTED_OLD_BCRYPT_HASH"

handlers:
  - url: /static
    static_dir: static
    secure: always
    http_headers:
      Cache-Control: "public, max-age=3600"
  - url: /.*
    script: auto
    secure: always
