<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="csrf-token" content="{{ csrf_token() }}">
  <title>Connexion — Pallas Athena</title>

  <!-- Tailwind CSS -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinner { animation: spin 0.7s linear infinite; }
  </style>
</head>
<body class="min-h-screen bg-[#FAFAFA] flex items-center justify-center px-4">

  <div class="w-full max-w-sm" x-data="loginForm()">

    {# ── Header ──────────────────────────────────────────────────── #}
    <div class="text-center mb-8">
      {# Shield / owl icon #}
      <svg class="mx-auto mb-4 w-12 h-12 text-gray-800" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12.75 11.25 15 15 9.75m-3-7.036A11.959 11.959 0 0 1 3.598 6 11.99 11.99 0 0 0 3 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285Z"/>
      </svg>
      <h1 class="text-2xl font-semibold text-gray-900 tracking-tight">Pallas Athena</h1>
    </div>

    {# ── Login card ──────────────────────────────────────────────── #}
    <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6">

      <div class="mb-5">
        <label for="email" class="block text-sm font-medium text-gray-700 mb-1">Courriel</label>
        <input id="email" type="email" required autocomplete="email"
               x-model="email"
               class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm
                      focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent">
      </div>

      <div class="mb-6">
        <label for="password" class="block text-sm font-medium text-gray-700 mb-1">Mot de passe</label>
        <input id="password" type="password" required autocomplete="current-password"
               x-model="password"
               @keydown.enter="submit()"
               class="w-full rounded-lg border border-gray-300 px-3 py-2.5 text-sm
                      focus:outline-none focus:ring-2 focus:ring-indigo-600 focus:border-transparent">
      </div>

      {# Error message #}
      <p x-show="error" x-text="error" x-cloak
         class="text-sm text-red-600 mb-4"></p>

      <button @click="submit()" :disabled="loading"
              class="w-full flex items-center justify-center gap-2 rounded-lg bg-gray-900 text-white
                     text-sm font-medium py-2.5 hover:bg-gray-800 disabled:opacity-60 transition-colors">
        <svg x-show="loading" x-cloak class="spinner w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
          <circle cx="12" cy="12" r="10" stroke-dasharray="60" stroke-dashoffset="15" />
        </svg>
        <span x-text="loading ? 'Connexion…' : 'Connexion'"></span>
      </button>
    </div>
  </div>

  {# ── Firebase Auth SDK (compat v9) ────────────────────────────── #}
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>

  <script>
    firebase.initializeApp({
      apiKey: "{{ firebase_api_key|default('') }}",
      authDomain: "{{ firebase_project_id }}.firebaseapp.com",
      projectId: "{{ firebase_project_id }}"
    });

    function loginForm() {
      return {
        email: '',
        password: '',
        error: '',
        loading: false,

        async submit() {
          this.error = '';
          this.loading = true;
          try {
            const cred = await firebase.auth()
              .signInWithEmailAndPassword(this.email, this.password);
            const idToken = await cred.user.getIdToken();

            const csrfToken = document.querySelector('meta[name="csrf-token"]').content;
            const body = new URLSearchParams({ id_token: idToken });
            const res = await fetch('/auth/verify-token', {
              method: 'POST',
              headers: {
                'Content-Type': 'application/x-www-form-urlencoded',
                'X-CSRFToken': csrfToken
              },
              body
            });

            const data = await res.json();
            if (data.ok) {
              window.location.href = data.redirect;
            } else {
              this.error = data.error || 'Erreur inconnue.';
            }
          } catch (err) {
            if (err.code === 'auth/invalid-credential' ||
                err.code === 'auth/wrong-password' ||
                err.code === 'auth/user-not-found') {
              this.error = 'Courriel ou mot de passe invalide.';
            } else if (err.code === 'auth/too-many-requests') {
              this.error = 'Trop de tentatives. Réessayez plus tard.';
            } else {
              this.error = 'Erreur de connexion. Réessayez.';
            }
          } finally {
            this.loading = false;
          }
        }
      };
    }
  </script>
</body>
</html>
