{# Reusable modal shell.
   Usage: {% include "components/modal.html" with context %}
   Caller sets: modal_id, modal_title, and provides modal_body block.
#}
<div x-data="{ open: false }"
     x-show="open"
     @open-modal-{{ modal_id|default('default') }}.window="open = true"
     @keydown.escape.window="open = false"
     x-cloak
     class="fixed inset-0 z-50 flex items-center justify-center bg-black/40 p-4">
  <div @click.outside="open = false"
       class="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden">
    <div class="flex items-center justify-between px-5 py-4 border-b border-gray-200">
      <h2 class="text-base font-semibold text-gray-900">{{ modal_title|default('') }}</h2>
      <button @click="open = false" class="text-gray-400 hover:text-gray-600">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" stroke-width="1.5" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6 18 18 6M6 6l12 12"/>
        </svg>
      </button>
    </div>
    <div class="p-5">
      {% block modal_body %}{% endblock %}
    </div>
  </div>
</div>
